

services:
  postgres:
    image: postgres:15
    container_name: whatsapp_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: whatsapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whatsapp_network

  redis:
    image: redis:7-alpine
    container_name: whatsapp_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - whatsapp_network

volumes:
  postgres_data:

networks:
  whatsapp_network:
    driver: bridge